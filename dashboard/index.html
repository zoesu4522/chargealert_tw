<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-size="md">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChargeAlert TW · 充電站即時監控</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ===== 主題變數:亮色為預設 ===== */
  :root {
    --scale: 1;            /* 字級倍率,由 A-/A/A+ 控制 */
    --green: #16a34a;
    --amber: #d97706;
    --red:   #dc2626;
    --cyan:  #0284c7;
    --accent: #16a34a;
  }
  html[data-theme="light"] {
    --bg: #f4f6fa;
    --bg-grad-1: rgba(22,163,74,0.06);
    --bg-grad-2: rgba(2,132,199,0.05);
    --panel: #ffffff;
    --panel-2: #f8fafc;
    --line: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --grid: #e8edf3;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
  }
  html[data-theme="dark"] {
    --bg: #0a0e14;
    --bg-grad-1: rgba(46,230,166,0.08);
    --bg-grad-2: rgba(56,189,248,0.06);
    --panel: #121821;
    --panel-2: #1a2230;
    --line: #243044;
    --text: #e6edf3;
    --muted: #7d8da3;
    --grid: #243044;
    --shadow: none;
    --green: #2ee6a6;
    --amber: #ffb454;
    --red:   #ff6b6b;
    --cyan:  #38bdf8;
    --accent: #2ee6a6;
  }
  /* ===== 字級三段 ===== */
  html[data-size="sm"] { --scale: 0.88; }
  html[data-size="md"] { --scale: 1; }
  html[data-size="lg"] { --scale: 1.15; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* 字級用 transition 讓 A-/A/A+ 平滑變化,消除瞬間縮放的不適感 */
  html { font-size: calc(16px * var(--scale)); transition: font-size 0.25s ease; }
  body {
    background:
      radial-gradient(900px 500px at 85% -10%, var(--bg-grad-1), transparent 60%),
      radial-gradient(700px 400px at 0% 0%, var(--bg-grad-2), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    /* flex 直向版面:撐滿視窗高度,讓 footer 能黏在底部 */
    min-height: 100vh;
    display: flex; flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }
  /* 主要內容區:套用與 header 相同的 max-width 並置中,讓內容與 logo 切齊 */
  .page {
    flex: 1 0 auto;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 clamp(16px, 4vw, 56px) 2rem;
  }

  /* ===== Header(sticky 固定頂端;bar 滿版,內容收進置中容器) ===== */
  header {
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  /* 內容容器:超過 max-width 後就置中,左右留白;尺寸用 px 固定,不受 A−/A/A+ 影響 */
  .header-inner {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    max-width: 1400px; margin: 0 auto;
    padding: 18px clamp(16px, 4vw, 56px);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo { font-size: 26px; font-weight: 800; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
  .brand .logo .bolt { color: var(--accent); }
  .brand .sub { color: var(--muted); font-size: 14px; }
  @media (max-width: 560px) { .brand .sub { display: none; } }

  .controls { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .live { font-size: 13px; color: var(--green); display: flex; align-items: center; gap: 6px; margin-right: 4px; }
  .live .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(22,163,74,0.5);} 70%{box-shadow:0 0 0 8px rgba(22,163,74,0);} 100%{box-shadow:0 0 0 0 rgba(22,163,74,0);} }

  .btn-group { display: flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; background: var(--panel); }
  .btn-group button {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    padding: 6px 11px; font-size: 13.5px; font-weight: 600; transition: all 0.15s;
    font-family: inherit;
  }
  .btn-group button:hover { color: var(--text); }
  .btn-group button.active { background: var(--accent); color: #fff; }
  html[data-theme="dark"] .btn-group button.active { color: #0a0e14; }
  .icon-btn {
    border: 1px solid var(--line); background: var(--panel); color: var(--text); cursor: pointer;
    width: 35px; height: 35px; border-radius: 999px; font-size: 16px; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { border-color: var(--accent); }

  /* ===== KPI ===== */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(11rem, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .kpi {
    background: linear-gradient(160deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: 14px; padding: 1.25rem 1.4rem;
    position: relative; overflow: hidden; box-shadow: var(--shadow); animation: rise 0.5s ease both;
  }
  .kpi::after { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--bar, var(--accent)); }
  .kpi .label { color: var(--muted); font-size: 0.82rem; margin-bottom: 0.5rem; }
  .kpi .value { font-size: 2.3rem; font-weight: 800; line-height: 1; }
  .kpi .unit { font-size: 0.85rem; color: var(--muted); margin-left: 0.25rem; font-weight: 500; }
  @keyframes rise { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }

  /* ===== 圖表卡 ===== */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 1.4rem 1.5rem; box-shadow: var(--shadow); animation: rise 0.6s ease both; }
  .card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem; }
  .card .hint { color: var(--muted); font-size: 0.78rem; margin-bottom: 1rem; }
  .card.wide { grid-column: 1 / -1; }

  /* 關鍵修正:用固定像素高度的 wrapper 包 canvas,Chart.js 才不會爆版/壓扁。
     canvas 一定要 position:absolute 填滿 wrapper。 */
  .chart-wrap { position: relative; width: 100%; height: 320px; }
  .chart-wrap.tall { height: 420px; }
  .chart-wrap canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
  @media (max-width: 560px) {
    .chart-wrap { height: 260px; }
    .chart-wrap.tall { height: 380px; }
  }

  /* ===== Footer(尺寸固定 px;用 flex 自動換行,每段不從中間斷字) ===== */
  footer {
    flex-shrink: 0;
    color: var(--muted); font-size: 12px;
    border-top: 1px solid var(--line);
    padding: 16px clamp(16px, 4vw, 56px);
    line-height: 1.7;
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    column-gap: 10px; row-gap: 2px;
  }
  footer .foot-seg { white-space: nowrap; }      /* 每段整段一起換行,不會斷在詞中間 */
  footer .foot-dot { color: var(--line); }        /* 分隔點 */
  @media (max-width: 560px) { footer .foot-dot { display: none; } }  /* 窄螢幕收起分隔點,排版更乾淨 */
  .err { background: rgba(217,119,6,0.12); border: 1px solid rgba(217,119,6,0.4); color: var(--amber); padding: 0.7rem 0.9rem; border-radius: 10px; font-size: 0.82rem; margin-bottom: 1.25rem; display: none; }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="logo"><span class="bolt">⚡</span> ChargeAlert TW</div>
        <div class="sub">電動車充電站即時監控後台</div>
      </div>
      <div class="controls">
        <span class="live"><span class="dot"></span> 即時資料</span>
        <div class="btn-group" id="sizeGroup">
          <button data-size="sm">A−</button>
          <button data-size="md" class="active">A</button>
          <button data-size="lg">A+</button>
        </div>
        <button class="icon-btn" id="themeBtn" title="切換主題">🌙</button>
      </div>
    </div>
  </header>

  <main class="page">
    <div id="errBox" class="err"></div>

    <section class="kpis" id="kpis"></section>

    <section class="grid">
      <div class="card">
        <h2>🔌 充電槍狀態分布</h2>
        <div class="hint">目前所有監測站點的即時狀態占比</div>
        <div class="chart-wrap"><canvas id="statusChart"></canvas></div>
      </div>
      <div class="card">
        <h2>⚡ AC / DC 可用概況</h2>
        <div class="hint">慢充(AC)與快充(DC)的可用 vs 總數(依 IEC 62196 分類)</div>
        <div class="chart-wrap"><canvas id="acdcChart"></canvas></div>
      </div>
      <div class="card wide">
        <h2>🏆 可用充電槍最多的站(Top 10)</h2>
        <div class="hint">目前空閒槍數最多的充電站排名</div>
        <div class="chart-wrap tall"><canvas id="topChart"></canvas></div>
      </div>
    </section>
  </main>

  <footer>
    <span class="foot-seg">ChargeAlert TW</span>
    <span class="foot-dot">·</span>
    <span class="foot-seg">資料來源 TDX 運輸資料流通服務</span>
    <span class="foot-dot">·</span>
    <span class="foot-seg">每次重新整理為當下即時狀態</span>
  </footer>

<script>
// ===== 主題 & 字級切換 =====
const root = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
function applyTheme(t) {
  root.setAttribute('data-theme', t);
  themeBtn.textContent = (t === 'light') ? '🌙' : '☀️';
  // 主題換色後,重畫圖表讓格線/文字顏色跟著變
  refreshChartColors();
}
themeBtn.addEventListener('click', () => {
  applyTheme(root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
});
document.getElementById('sizeGroup').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  root.setAttribute('data-size', b.dataset.size);
  document.querySelectorAll('#sizeGroup button').forEach(x => x.classList.toggle('active', x === b));
  // 字級變動會改變容器尺寸,通知圖表重算
  Object.values(charts).forEach(c => c && c.resize());
});

// ===== 顏色取用(讀 CSS 變數,主題切換後即時更新) =====
function cssVar(name) { return getComputedStyle(root).getPropertyValue(name).trim(); }
function palette() {
  return { green: cssVar('--green'), amber: cssVar('--amber'), red: cssVar('--red'),
           cyan: cssVar('--cyan'), muted: cssVar('--muted'), grid: cssVar('--grid'),
           text: cssVar('--text'), panel: cssVar('--panel') };
}

const charts = { status: null, acdc: null, top: null };
let DATA = null; // 存查到的資料,重畫時用

function refreshChartColors() {
  if (!DATA) return;
  Object.values(charts).forEach(c => { if (c) c.destroy(); });
  drawCharts();
}

// ===== 範例資料 fallback(本機預覽用) =====
const SAMPLE = {
  stats: { station_count: 354, total: 1577, available: 1128, ac_available: 980, ac_total: 1300, dc_available: 148, dc_total: 277 },
  distribution: [ {status:1,label:'空閒',count:1128}, {status:2,label:'使用中',count:245}, {status:3,label:'離線',count:204} ],
  stations: [ {station_name:'南崁公一地下停車場',available:24,total:28}, {station_name:'藝文園區地下停車場(北)',available:12,total:15}, {station_name:'中壢中油內壢站',available:10,total:14} ],
};
async function getJSON(path, fallback) {
  try { const r = await fetch(path); if (!r.ok) throw 0; return await r.json(); }
  catch (e) {
    const box = document.getElementById('errBox');
    box.style.display = 'block';
    box.textContent = '⚠ 目前顯示範例資料(連不到後端 API)。部署到 EC2 後會自動顯示即時資料。';
    return fallback;
  }
}

function kpiCard(label, value, unit, color) {
  return `<div class="kpi" style="--bar:${color}"><div class="label">${label}</div><div class="value">${value.toLocaleString()}<span class="unit">${unit}</span></div></div>`;
}

function drawCharts() {
  const P = palette();
  Chart.defaults.color = P.muted;
  Chart.defaults.font.family = '"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif';
  Chart.defaults.borderColor = P.grid;

  const s = DATA.stats, d = DATA.distribution, t = DATA.stations;

  charts.acdc = new Chart(document.getElementById('acdcChart'), {
    type: 'bar',
    data: { labels: ['AC 慢充','DC 快充'], datasets: [
      { label:'可用', data:[s.ac_available, s.dc_available], backgroundColor:P.green, borderRadius:6 },
      { label:'總數', data:[s.ac_total, s.dc_total], backgroundColor:P.muted+'59', borderRadius:6 } ] },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom'} },
      scales:{ y:{beginAtZero:true, grid:{color:P.grid}}, x:{grid:{display:false}} } },
  });

  const colorByStatus = { 1:P.green, 2:P.amber, 3:P.red };
  charts.status = new Chart(document.getElementById('statusChart'), {
    type:'doughnut',
    data:{ labels:d.map(x=>x.label), datasets:[{ data:d.map(x=>x.count),
      backgroundColor:d.map(x=>colorByStatus[x.status]||P.muted), borderColor:P.panel, borderWidth:3 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{position:'bottom'} } },
  });

  charts.top = new Chart(document.getElementById('topChart'), {
    type:'bar',
    data:{ labels:t.map(x=>x.station_name), datasets:[{ label:'可用槍數', data:t.map(x=>x.available), backgroundColor:P.green, borderRadius:6 }] },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ afterLabel:(ctx)=>'總數 '+t[ctx.dataIndex].total+' 支' } } },
      scales:{ x:{beginAtZero:true, grid:{color:P.grid}}, y:{grid:{display:false}} } },
  });
}

async function render() {
  const stats = await getJSON('/api/stats', SAMPLE.stats);
  const distribution = (await getJSON('/api/status-distribution', {distribution:SAMPLE.distribution})).distribution;
  const stations = (await getJSON('/api/top-stations', {stations:SAMPLE.stations})).stations;
  DATA = { stats, distribution, stations };

  document.getElementById('kpis').innerHTML =
    kpiCard('監測站點', stats.station_count, '站', cssVar('--cyan')) +
    kpiCard('充電槍總數', stats.total, '支', cssVar('--text')) +
    kpiCard('目前可用', stats.available, '支', cssVar('--green')) +
    kpiCard('使用中 + 離線', stats.total - stats.available, '支', cssVar('--amber'));

  drawCharts();
}
render();
</script>
</body>
</html>
