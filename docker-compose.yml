services:
  db:
    image: mysql:8.0
    container_name: chargealert_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Taipei
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: chargealert_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      TDX_CLIENT_ID: ${TDX_CLIENT_ID}
      TDX_CLIENT_SECRET: ${TDX_CLIENT_SECRET}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      LINE_USER_ID: ${LINE_USER_ID}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      TZ: Asia/Taipei

  # ── 新增:LINE webhook(FastAPI)──────────────────────────────
  # 不開對外埠,只在 docker 內部讓 Caddy 用服務名 webhook:8000 連到它。
  # DB 環境變數先放好,這一步(echo 測試)還用不到,下一步接 LLM/MySQL 就直接能用。
  webhook:
    build: ./webhook
    container_name: chargealert_webhook
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      TDX_CLIENT_ID: ${TDX_CLIENT_ID}
      TDX_CLIENT_SECRET: ${TDX_CLIENT_SECRET}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      CWA_API_KEY: ${CWA_API_KEY}
      WEATHER_VERIFY_SSL: "0"
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      TZ: Asia/Taipei

  #新增:Caddy 反向代理 + 自動 HTTPS
  #唯一對外開埠的服務(80/443)。憑證存在 caddy_data,重啟不會重新申請。
  caddy:
    image: caddy:2-alpine
    container_name: chargealert_caddy
    restart: always
    depends_on:
      - webhook
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./dashboard:/srv/dashboard:ro
      - ./img:/srv/img:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config: